services:
  - type: web
    name: seoul-mouse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
    plan: free